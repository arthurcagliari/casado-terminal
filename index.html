<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Casado Terminal v2</title>

<!-- Biblioteca de feriados -->
<script src="https://cdn.jsdelivr.net/npm/date-holidays@3.23.15/dist/index.umd.min.js"></script>

<style>
body {
  background: #0b0f14;
  color: #d6d6d6;
  font-family: "Courier New", monospace;
  max-width: 750px;
  margin: auto;
  padding: 20px;
}

h2 {
  color: #00ff88;
  letter-spacing: 2px;
}

label {
  font-size: 12px;
  color: #7aa2ff;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #111722;
  border: 1px solid #2a3441;
  color: #d6d6d6;
}

button {
  width: 100%;
  padding: 12px;
  background: #00ff88;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00cc6a;
}

.box {
  margin-top: 20px;
  padding: 15px;
  border: 1px solid #2a3441;
  background: #0f1621;
}

.label {
  font-size: 12px;
  color: #7aa2ff;
}

.value {
  font-size: 22px;
  font-weight: bold;
}

.green { color: #00ff88; }
.yellow { color: #ffd400; }
.orange { color: #ff7a00; }
.red { color: #ff4d4d; }
</style>
</head>

<body>

<h2>CASADO TERMINAL v2 //</h2>

<label>Data Inicial (dd/mm/aaaa)</label>
<input id="inicio">

<label>Último dia útil do mês</label>
<input id="fim">

<label>Dólar Futuro</label>
<input id="futuro">

<label>CDI (ex: 0.1465)</label>
<input id="cdi">

<label>Dólar Casado</label>
<input id="casado">

<label>Fed Funds (%)</label>
<input id="fed">

<button onclick="calc()">CALCULAR</button>
<button onclick="copiar()">COPIAR RESULTADO</button>

<div class="box" id="out"></div>

<script>

const hdBR = new Holidays('BR');
const hdUS = new Holidays('US');

function parse(d){
  let [day,mon,year] = d.split("/");
  return new Date(year, mon-1, day);
}

function isWeekend(d){
  return d.getDay() === 0 || d.getDay() === 6;
}

// BR business day (CDI)
function isBR(d){
  return !isWeekend(d) && !hdBR.isHoliday(d);
}

// USD settlement (BR + US)
function isSettle(d){
  return !isWeekend(d) && !hdBR.isHoliday(d) && !hdUS.isHoliday(d);
}

function addBizDays(date, n, fn){
  let c = 0;
  let d = new Date(date);

  while(c < n){
    d.setDate(d.getDate()+1);
    if(fn(d)) c++;
  }
  return d;
}

function spreadColor(x){
  if(x > 2.0) return "red";
  if(x > 1.8) return "orange";
  if(x > 1.5) return "yellow";
  return "green";
}

let lastResult = "";

function calc(){

  let ini = parse(document.getElementById("inicio").value);
  let fim = parse(document.getElementById("fim").value);

  let fut = parseFloat(document.getElementById("futuro").value);
  let cdi = parseFloat(document.getElementById("cdi").value);
  let cas = parseFloat(document.getElementById("casado").value);
  let fed = parseFloat(document.getElementById("fed").value);

  // D+2 settlement
  let ini2 = addBizDays(ini,2,isSettle);
  let fim2 = addBizDays(fim,2,isSettle);

  let dc = 0;
  let du = 0;

  let d = new Date(ini2);

  while(d < fim2){
    dc++;
    if(isBR(d)) du++;
    d.setDate(d.getDate()+1);
  }

  let spot = fut - (cas/1000);

  let taxa = (360/dc) * (
    (spot * Math.pow(1+cdi, du/252)) / (fut - 0.0002) - 1
  );

  let taxaPct = taxa * 100;
  let spread = taxaPct - fed;

  lastResult = `Spot: ${spot.toFixed(6)} | Casado: ${taxaPct.toFixed(2)}% | Spread: ${spread.toFixed(2)}%`;

  document.getElementById("out").innerHTML = `

    <div class="label">SPOT</div>
    <div class="value">${spot.toFixed(6)}</div>

    <div class="label">TAXA CASADO</div>
    <div class="value green">${taxaPct.toFixed(2)}%</div>

    <div class="label">SPREAD</div>
    <div class="value ${spreadColor(spread)}">${spread.toFixed(2)}%</div>

  `;
}

function copiar(){
  navigator.clipboard.writeText(lastResult);
  alert("Resultado copiado!");
}

</script>

</body>
</html>
